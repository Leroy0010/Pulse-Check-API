services:
  # PostgreSQL Database
  # PostgreSQL Database
  postgres:
    image: postgres:18.1-alpine3.23
    container_name: pulse-check-api-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-pulse-check-api-db}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
      # ADD THIS LINE FOR POSTGRES 18+:
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      # Bind to localhost
      - "5432:5432"
    volumes:
      # CHANGE THIS LINE FOR POSTGRES 18+:
      - pg_data:/var/lib/postgresql/data
    networks:
      - pulse-check-api-network
    healthcheck:
      test:
        [ "CMD-SHELL", "pg_isready -U postgres -d pulse-check-api-db" ]
      interval: 10s
      timeout: 5s
      retries: 5
  # Spring Boot Application
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: pulse-check-api-network-app-dev
    develop:
      watch:
        - action: rebuild
          path: ./src
          target: /app/src

    env_file:
      - .env
    environment:
      # Database Configuration
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL:-jdbc:postgresql://postgres:5432/pulse-check-api-db}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:-postgres}
      SPRING_JPA_HIBERNATE_DDL_AUTO: none # Or 'create', 'create-drop' etc.

      # Application Configuration
      SPRING_PROFILES_ACTIVE: dev
      SERVER_PORT: 8080

    ports:
      - "8080:8080"
      # Bind debug port to localhost only
      - "5005:5005"
    volumes:
      - ./src:/app/src # Hot reload
      - ./logs:/app/logs
      - ~/.m2:/root/.m2
    depends_on:
      postgres:
        condition: service_healthy

    networks:
      - pulse-check-api-network
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -f http://localhost:8080/actuator/health || exit 1",
        ]
      interval: 20s
      timeout: 10s
      retries: 5

  # pgAdmin for Database Management (Optional)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pulse-check-api-network-pgadmin-dev
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@pulse-check-api-network.com
      PGADMIN_DEFAULT_PASSWORD: admin123
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - postgres
    networks:
      - pulse-check-api-network
    profiles:
      - tools

volumes:
  pg_data:


networks:
  pulse-check-api-network:
    driver: bridge
